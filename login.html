<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Social Media Tracker</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="config.js?v=20260616f"></script>
  <script src="api.js?v=20260616k"></script>
  <script src="auth.js?v=20260616d"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#4744e5",
            surface: "#f6f8fb",
            card: "#ffffff",
            ink: "#202534",
            muted: "#6a7285",
            border: "#e5e9f2",
            accent: "#00C875"
          }
        }
      }
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="min-h-screen bg-surface text-ink">
  <div class="flex min-h-screen items-center justify-center px-6 py-10">
    <div class="w-full max-w-md">
      <div class="mb-6 text-center">
        <div class="inline-flex items-center gap-3 rounded-full border border-border bg-white px-4 py-2 shadow-sm">
          <span class="flex h-9 w-9 items-center justify-center rounded-2xl bg-primary text-white">
            <span class="material-symbols-outlined text-[20px]">dashboard</span>
          </span>
          <span class="text-base font-semibold">Social Media Tracker</span>
        </div>
      </div>

      <div class="rounded-[28px] border border-border bg-card p-7 shadow-[0_24px_60px_-28px_rgba(32,37,52,0.28)] lg:p-9">
        <div class="mb-8">
          <h1 class="text-3xl font-bold tracking-tight">Sign in</h1>
          <p class="mt-2 text-sm leading-6 text-muted">Use your email and password to continue.</p>
        </div>

        <form id="login-form" class="space-y-5">
          <div class="space-y-2">
            <label for="login-email" class="block text-sm font-medium text-ink">Email</label>
            <input id="login-email" type="email" class="h-12 w-full rounded-2xl border border-border bg-white px-4 text-sm outline-none transition focus:border-primary focus:ring-4 focus:ring-primary/10" placeholder="name@company.com" required>
          </div>
          <div class="space-y-2">
            <label for="login-password" class="block text-sm font-medium text-ink">Password</label>
            <input id="login-password" type="password" class="h-12 w-full rounded-2xl border border-border bg-white px-4 text-sm outline-none transition focus:border-primary focus:ring-4 focus:ring-primary/10" placeholder="Enter password" required>
          </div>
          <p id="login-error" class="hidden rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600"></p>
          <button id="login-submit" type="submit" class="flex h-12 w-full items-center justify-center gap-2 rounded-2xl bg-primary text-sm font-semibold text-white shadow-lg shadow-primary/20 transition hover:opacity-95 active:scale-[0.99]">
            <span class="material-symbols-outlined text-[18px]">lock</span>
            <span>Sign In</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("login-form");
      const emailInput = document.getElementById("login-email");
      const passwordInput = document.getElementById("login-password");
      const errorBox = document.getElementById("login-error");
      const submitButton = document.getElementById("login-submit");
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorBox.classList.add("hidden");
        submitButton.disabled = true;
        submitButton.classList.add("opacity-70");

        const result = await AUTH.login(emailInput.value.trim(), passwordInput.value);
        if (!result.ok) {
          errorBox.textContent = result.message || "Login failed.";
          errorBox.classList.remove("hidden");
          submitButton.disabled = false;
          submitButton.classList.remove("opacity-70");
          return;
        }

        window.location.href = "index.html";
      });
    });
  </script>
</body>
</html>
