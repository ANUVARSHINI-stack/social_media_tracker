<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Social Media Tracker</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms&v=20260617a"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="config.js?v=20260616f"></script>
  <script src="api.js?v=20260616k"></script>
  <script src="auth.js?v=20260630a"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#4744e5",
            primaryDark: "#3633ca",
            surface: "#eef2ff",
            card: "#ffffff",
            ink: "#1f2432",
            muted: "#697386",
            border: "#e4e9f2",
            accent: "#00C875",
            panel: "#0f172a"
          },
          boxShadow: {
            premium: "0 40px 100px -46px rgba(15, 23, 42, 0.42)",
            soft: "0 20px 46px -22px rgba(71, 68, 229, 0.28)"
          }
        }
      }
    };
  </script>
  <style>
    body {
      font-family: "Inter", sans-serif;
      background:
        linear-gradient(135deg, rgba(71, 68, 229, 0.08), rgba(0, 200, 117, 0.05)),
        linear-gradient(180deg, #f8faff 0%, #eef3fb 100%);
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.08) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.4), transparent 85%);
      pointer-events: none;
    }

    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }
  </style>
</head>
<body class="min-h-screen text-ink">
  <div class="flex min-h-screen items-center justify-center px-5 py-10 sm:px-6">
    <div class="w-full max-w-[460px]">
      <div class="mb-8 text-center">
        <div class="inline-flex items-center gap-3 rounded-full border border-white/80 bg-white px-5 py-3 shadow-soft">
          <span class="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-primary to-primaryDark text-white shadow-lg shadow-primary/25">
            <span class="material-symbols-outlined text-[22px]">dashboard</span>
          </span>
          <span class="text-lg font-bold tracking-tight text-ink">Social Media Tracker</span>
        </div>
      </div>

      <div class="overflow-hidden rounded-[34px] border border-white/80 bg-white shadow-premium">
        <div class="relative overflow-hidden border-b border-slate-100 px-7 pb-6 pt-7 sm:px-8 sm:pt-8">
          <div class="absolute inset-x-0 top-0 h-1 bg-gradient-to-r from-primary via-[#6d67ff] to-accent"></div>
          <div class="mb-5 flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-primary/15 to-primary/5 text-primary">
            <span class="material-symbols-outlined text-[28px]">lock_person</span>
          </div>
          <h1 class="text-[32px] font-bold tracking-tight text-ink">Welcome back</h1>
          <p class="mt-2 max-w-[280px] text-sm leading-6 text-muted">Use your work email and password to access your dashboard.</p>
        </div>

        <div class="px-7 py-7 sm:px-8 sm:py-8">
          <form id="login-form" class="space-y-5">
            <div class="space-y-2">
              <label for="login-email" class="block text-sm font-semibold text-ink">Email</label>
              <input
                id="login-email"
                type="email"
                class="h-14 w-full rounded-2xl border border-border bg-slate-50 px-4 text-sm text-ink outline-none transition duration-200 placeholder:text-slate-400 focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10"
                placeholder="name@company.com"
                required
              >
            </div>

            <div class="space-y-2">
              <label for="login-password" class="block text-sm font-semibold text-ink">Password</label>
              <div class="relative">
                <input
                  id="login-password"
                  type="password"
                  class="h-14 w-full rounded-2xl border border-border bg-slate-50 px-4 pr-14 text-sm text-ink outline-none transition duration-200 placeholder:text-slate-400 focus:border-primary focus:bg-white focus:ring-4 focus:ring-primary/10"
                  placeholder="Enter password"
                  required
                >
                <button
                  id="login-password-toggle"
                  type="button"
                  class="absolute right-3 top-1/2 flex h-9 w-9 -translate-y-1/2 items-center justify-center rounded-xl text-slate-500 transition hover:bg-slate-100 hover:text-slate-700"
                  aria-label="Show password"
                >
                  <span class="material-symbols-outlined text-[20px]">visibility</span>
                </button>
              </div>
            </div>

            <p id="login-error" class="hidden rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600"></p>

            <button
              id="login-submit"
              type="submit"
              class="flex h-14 w-full items-center justify-center gap-2 rounded-2xl bg-gradient-to-r from-primary to-primaryDark text-sm font-semibold text-white shadow-lg shadow-primary/25 transition duration-200 hover:brightness-105 active:scale-[0.99] disabled:cursor-not-allowed disabled:opacity-70"
            >
              <span class="material-symbols-outlined text-[18px]">login</span>
              <span>Sign In</span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("login-form");
      const emailInput = document.getElementById("login-email");
      const passwordInput = document.getElementById("login-password");
      const passwordToggle = document.getElementById("login-password-toggle");
      const errorBox = document.getElementById("login-error");
      const submitButton = document.getElementById("login-submit");

      if (passwordToggle) {
        passwordToggle.addEventListener("click", () => {
          const isPassword = passwordInput.type === "password";
          passwordInput.type = isPassword ? "text" : "password";
          passwordToggle.setAttribute("aria-label", isPassword ? "Hide password" : "Show password");
          passwordToggle.innerHTML = `<span class="material-symbols-outlined text-[20px]">${isPassword ? "visibility_off" : "visibility"}</span>`;
        });
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorBox.classList.add("hidden");
        submitButton.disabled = true;

        const result = await AUTH.login(emailInput.value.trim(), passwordInput.value);
        if (!result.ok) {
          errorBox.textContent = result.message || "Login failed.";
          errorBox.classList.remove("hidden");
          submitButton.disabled = false;
          return;
        }

        window.location.href = "index.html";
      });
    });
  </script>
</body>
</html>
