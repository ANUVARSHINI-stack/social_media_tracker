<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New Shop - Kinetic Enterprise</title>

                    "surface-tint": "#4745e5",

                    "on-error-container": "#93000a",
                    "text-secondary": "#676879",
                    "outline-variant": "#c7c4d8",
                    "surface-container-lowest": "#ffffff",
                    "surface-bright": "#f8f9fa",
                    "secondary": "#8337be",
                    "on-primary-fixed-variant": "#2c24ce",
                    "status-completed": "#00C875",
                    "on-surface-variant": "#464555",
                    "primary-fixed-dim": "#c1c1ff",
                    "outline": "#767587",
                    "on-primary-fixed": "#09006b",
                    "on-primary-container": "#ffffff",
                    "surface-container-high": "#e7e8e9",
                    "on-secondary-fixed-variant": "#6915a5",
                    "background": "#f8f9fa",
                    "border-subtle": "#E6E9EF",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#34dbdb",
                    "status-missed": "#FF3D57",
                    "secondary-fixed": "#f2daff",
                    "text-primary": "#333333",
                    "tertiary-container": "#008484",
                    "on-secondary-fixed": "#2e004e",
                    "primary": "#4744e5",
                    "on-secondary-container": "#4c007d",
                    "inverse-surface": "#2e3132",
                    "surface-container-highest": "#e1e3e4",
                    "status-scheduled": "#FFCB00",
                    "surface-dim": "#d9dadb",
                    "inverse-on-surface": "#f0f1f2",
                    "surface-container": "#edeeef",
                    "on-surface": "#191c1d",
                    "error-container": "#ffdad6",
                    "primary-container": "#6161ff",
                    "surface-container-low": "#f3f4f5",
                    "on-tertiary-container": "#ffffff",
                    "secondary-fixed-dim": "#e0b6ff",
                    "primary-fixed": "#e1dfff",
                    "secondary-container": "#c276ff",
                    "on-background": "#191c1d",
                    "on-tertiary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "8px",
                    "margin-mobile": "16px",
                    "gutter": "24px",
                    "container-max": "1440px",
                    "margin-desktop": "40px"
            },
            "fontFamily": {

            "fontSize": {

                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-md": ["13px", {"lineHeight": "18px", "letterSpacing": "0.01em", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .modal-overlay {
            background: rgba(25, 28, 29, 0.4);
            backdrop-filter: blur(4px);
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        
        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-active { animation: toastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-gutter">
<!-- Main Background (Simulating a Dashboard Context) -->
<div class="fixed inset-0 z-0 overflow-hidden opacity-20 pointer-events-none">

</div>
<!-- Background Content Mockup (Blurry) -->
<main class="w-full max-w-container-max mx-auto filter blur-sm select-none">
<div class="grid grid-cols-12 gap-gutter">
<div class="col-span-12 md:col-span-3 h-64 bg-white rounded-xl shadow-sm border border-border-subtle"></div>
<div class="col-span-12 md:col-span-9 h-64 bg-white rounded-xl shadow-sm border border-border-subtle"></div>
<div class="col-span-12 h-96 bg-white rounded-xl shadow-sm border border-border-subtle"></div>
</div>
</main>
<!-- Modal Overlay -->
<div class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-margin-mobile" id="modal-overlay">
<!-- Modal Card -->
<div class="bg-surface-container-lowest w-full max-w-[480px] rounded-xl shadow-[0px_10px_30px_-5px_rgba(0,0,0,0.08)] border border-border-subtle overflow-hidden animate-slide-up">
<!-- Modal Header -->
<div class="px-gutter py-5 flex items-center justify-between border-b border-border-subtle bg-surface-bright">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Add New Shop</h2>
<button class="text-on-surface-variant hover:bg-surface-container-high p-2 rounded-full transition-colors" onclick="closeModal()">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Content (Form) -->
<form class="p-gutter space-y-6" id="add-shop-form" onsubmit="handleFormSubmit(event)">
<!-- Shop Name Field -->
<div class="space-y-2">
<label class="flex items-center justify-between font-label-md text-label-md text-on-surface-variant" for="shop-name">
<span>Shop Name <span class="text-error">*</span></span>
<span class="text-error text-[11px] hidden" id="name-error">Field required</span>
</label>
<div class="relative">
<input class="w-full h-[48px] px-4 rounded-lg border border-border-subtle bg-white text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-outline/50" id="shop-name" placeholder="e.g. Kinetic Downtown" required="" type="text"/>
</div>
</div>
<!-- Description Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="description">
                        Description <span class="text-outline font-normal">(Optional)</span>
</label>
<textarea class="w-full p-4 rounded-lg border border-border-subtle bg-white text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-outline/50 resize-none" id="description" placeholder="Describe the shop's focus and audience..." rows="3"></textarea>
</div>
<!-- Total Posts Field -->
<div class="space-y-2">
<label class="flex items-center justify-between font-label-md text-label-md text-on-surface-variant" for="total-posts">
<span>Total Posts This Month <span class="text-error">*</span></span>
<span class="text-error text-[11px] hidden" id="posts-error">Enter a valid number</span>
</label>
<div class="relative">
<input class="w-full h-[48px] px-4 rounded-lg border border-border-subtle bg-white text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-outline/50" id="total-posts" min="0" placeholder="0" required="" type="number"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-outline/60">
<span class="material-symbols-outlined text-[20px]">analytics</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row gap-3 pt-4">
<button class="flex-1 h-[44px] flex items-center justify-center font-label-md text-label-md text-on-surface-variant hover:bg-surface-container transition-colors rounded-lg border border-border-subtle" onclick="closeModal()" type="button">
                        Cancel
                    </button>
<button class="flex-1 h-[44px] flex items-center justify-center font-label-md text-label-md bg-primary text-on-primary hover:bg-primary-container transition-all rounded-lg shadow-sm hover:shadow-md active:scale-95" type="submit">
                        Save Shop
                    </button>
</div>
</form>
</div>
</div>
<!-- Success Toast Notification -->
<div class="fixed top-gutter right-gutter z-[60] hidden" id="success-toast">
<div class="toast-active bg-inverse-surface text-inverse-on-surface px-6 py-4 rounded-xl shadow-lg flex items-center gap-4 min-w-[320px] border border-outline-variant/20">
<div class="w-8 h-8 rounded-full bg-status-completed flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[20px]">check</span>
</div>
<div>
<p class="font-label-md text-label-md font-bold">Success!</p>
<p class="text-[12px] opacity-80">Shop has been created successfully.</p>
</div>
<button class="ml-auto opacity-60 hover:opacity-100" onclick="hideToast()">
<span class="material-symbols-outlined text-[18px]">close</span>
</button>
</div>
</div>
<script>
        function closeModal() {
            const modal = document.getElementById('modal-overlay');
            modal.style.opacity = '0';
            modal.style.pointerEvents = 'none';
            // In a real app, this might redirect or reset state
            setTimeout(() => {
                modal.classList.add('hidden');
                // Re-enable for demo purposes
                setTimeout(() => {
                    modal.classList.remove('hidden');
                    modal.style.opacity = '1';
                    modal.style.pointerEvents = 'all';
                }, 3000);
            }, 300);
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            
            const name = document.getElementById('shop-name').value;
            const posts = document.getElementById('total-posts').value;
            
            let isValid = true;

            if (!name) {
                document.getElementById('name-error').classList.remove('hidden');
                isValid = false;
            } else {
                document.getElementById('name-error').classList.add('hidden');
            }

            if (!posts || posts < 0) {
                document.getElementById('posts-error').classList.remove('hidden');
                isValid = false;
            } else {
                document.getElementById('posts-error').classList.add('hidden');
            }

            if (isValid) {
                showToast();
                // Simulating form reset and modal close after short delay
                setTimeout(() => {
                    document.getElementById('add-shop-form').reset();
                    closeModal();
                }, 2000);
            }
        }

        function showToast() {
            const toast = document.getElementById('success-toast');
            toast.classList.remove('hidden');
            setTimeout(() => {
                hideToast();
            }, 5000);
        }

        function hideToast() {
            const toast = document.getElementById('success-toast');
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(20px)';
            toast.style.transition = 'all 0.3s ease';
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.style.opacity = '1';
                toast.style.transform = 'none';
            }, 300);
        }
    </script>
</body></html>
